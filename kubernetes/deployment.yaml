---
# Backend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: saleapp-backend
  labels:
    app: saleapp
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: saleapp
      component: backend
  template:
    metadata:
      labels:
        app: saleapp
        component: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/OWNER/saleapp-backend:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: saleapp-secrets
                  key: database-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: saleapp-secrets
                  key: jwt-secret
            - name: GIN_MODE
              value: "release"
            - name: LOG_LEVEL
              value: "info"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      restartPolicy: Always

---
# Frontend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: saleapp-frontend
  labels:
    app: saleapp
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: saleapp
      component: frontend
  template:
    metadata:
      labels:
        app: saleapp
        component: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/OWNER/saleapp-frontend:latest
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "http://saleapp-backend:8080/api/v1"
            - name: NODE_ENV
              value: "production"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      restartPolicy: Always
