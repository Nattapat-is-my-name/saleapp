name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  GO_VERSION: '1.22'
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME_BACKEND: ghcr.io/${{ github.repository }}/saleapp-backend
  IMAGE_NAME_FRONTEND: ghcr.io/${{ github.repository }}/saleapp-frontend

jobs:
  # Build and push images
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    outputs:
      backend_tag: ${{ steps.meta.outputs.backend_tag }}
      frontend_tag: ${{ steps.meta.outputs.frontend_tag }}
      short_sha: ${{ steps.vars.outputs.short_sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set variables
        id: vars
        run: echo "short_sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for backend
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME_BACKEND }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.vars.outputs.short_sha }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata for frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME_FRONTEND }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.vars.outputs.short_sha }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy to staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'staging'
    environment: staging

    steps:
      - name: Deploy to staging
        run: |
          echo "Deploying backend: ${{ needs.build-and-push.outputs.backend_tag }}"
          echo "Deploying frontend: ${{ needs.build-and-push.outputs.frontend_tag }}"
          echo "Commit SHA: ${{ needs.build-and-push.outputs.short_sha }}"
          
          # Kubernetes deployment example
          # kubectl set image deployment/saleapp-backend backend=${{ env.REGISTRY }}/${{ github.repository }}/saleapp-backend:${{ needs.build-and-push.outputs.short_sha }}
          # kubectl set image deployment/saleapp-frontend frontend=${{ env.REGISTRY }}/${{ github.repository }}/saleapp-frontend:${{ needs.build-and-push.outputs.short_sha }}
          
          echo "::notice::Staging deployment placeholder - implement your deployment strategy"

  # Deploy to production
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event.inputs.environment == 'production'
    environment: production

    steps:
      - name: Deploy to production
        run: |
          echo "Deploying backend: ${{ needs.build-and-push.outputs.backend_tag }}"
          echo "Deploying frontend: ${{ needs.build-and-push.outputs.frontend_tag }}"
          echo "Commit SHA: ${{ needs.build-and-push.outputs.short_sha }}"
          
          # Kubernetes deployment example
          # kubectl set image deployment/saleapp-backend backend=${{ env.REGISTRY }}/${{ github.repository }}/saleapp-backend:${{ needs.build-and-push.outputs.short_sha }}
          # kubectl set image deployment/saleapp-frontend frontend=${{ env.REGISTRY }}/${{ github.repository }}/saleapp-frontend:${{ needs.build-and-push.outputs.short_sha }}
          
          echo "::notice::Production deployment placeholder - implement your deployment strategy"
