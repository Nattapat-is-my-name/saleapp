server:
  host: "0.0.0.0"
  port: "8080"
  env: "development"

database:
  host: "localhost"
  port: "5432"
  name: "saleapp"
  user: "postgres"
  password: "postgres"
  sslmode: "disable"

jwt:
  secret: "your-secret-key-change-in-production-min-32-chars"
  expiry_hours: 24

stripe:
  secret_key: "${STRIPE_SECRET_KEY}"
  webhook_secret: "${STRIPE_WEBHOOK_SECRET}"
  currency: "usd"

log:
  level: "debug"
